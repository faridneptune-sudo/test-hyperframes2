<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0818; font-family: sans-serif; }
.bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, #0a0818 60%, #1a100a 100%); }
.moon { position: absolute; top: 60px; right: 180px; width: 110px; height: 110px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #fffde7, #f0d060); box-shadow: 0 0 60px 30px rgba(255,240,150,0.4); }
.floor { position: absolute; bottom: 0; width: 100%; height: 280px; background: linear-gradient(180deg, #3d1f08 0%, #2a1505 100%); border-top: 6px solid #6b3a1a; }
.table { position: absolute; bottom: 200px; left: 320px; width: 900px; height: 40px; background: linear-gradient(180deg, #8B4513 0%, #6b3310 100%); border-radius: 4px; }
.map { position: absolute; bottom: 235px; left: 380px; width: 680px; height: 220px; background: linear-gradient(135deg, #d4a96a, #c8924a, #d4a96a); border-radius: 8px; border: 3px solid #8B6914; overflow: hidden; }
.map-title { position: absolute; top: 12px; width: 100%; text-align: center; font-size: 18px; font-weight: bold; color: #5c3a10; letter-spacing: 3px; }
.map-continent1 { position: absolute; top: 45px; left: 30px; width: 120px; height: 130px; background: #8fad5a; border-radius: 40% 60% 50% 40%; }
.map-continent2 { position: absolute; top: 35px; right: 40px; width: 130px; height: 140px; background: #8fad5a; border-radius: 40% 50% 40% 60%; }
.map-unknown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 22px; color: #7a5520; font-style: italic; }
.candle-body { position: absolute; bottom: 235px; left: 1090px; width: 24px; height: 70px; background: #f5f0e8; border-radius: 3px; }
.candle-flame { position: absolute; bottom: 305px; left: 1087px; width: 20px; height: 35px; background: radial-gradient(ellipse at 50% 80%, #ff6600, #ffcc00); border-radius: 50% 50% 30% 30%; }
.chapter-title { position: absolute; top: 0; left: 0; width: 100%; padding: 20px 0; text-align: center; background: linear-gradient(180deg, rgba(0,0,0,0.8), transparent); }
.chapter-label { font-size: 28px; color: #c8a84b; letter-spacing: 6px; }
.chapter-name { font-size: 58px; font-weight: bold; color: #f9e076; text-shadow: 3px 3px 0 #8B6914; }
.narration { position: absolute; bottom: 40px; width: 100%; text-align: center; padding: 30px 0 20px; }
.narration-line { font-size: 34px; color: #e8e0c8; font-style: italic; line-height: 1.8; }
.highlight { color: #f9e076; font-weight: bold; font-style: normal; }
</style>
</head>
<body
  data-composition-id="chapitre1"
  data-width="1920"
  data-height="1080"
  data-duration="15">

<div class="bg"></div>
<div class="moon"></div>
<div class="floor"></div>
<div class="table"></div>
<div class="map">
  <div class="map-title">MAPPA MUNDI - 1519</div>
  <div class="map-continent1"></div>
  <div class="map-continent2"></div>
  <div class="map-unknown">TERRA INCOGNITA</div>
</div>
<div class="candle-flame"></div>
<div class="candle-body"></div>

<div class="chapter-title">
  <div class="chapter-label">Chapitre I</div>
  <div class="chapter-name">Le Reve d un Explorateur</div>
</div>
<div class="narration">
  <div class="narration-line">Lisbonne, 1519. Dans la lueur vacillante d une chandelle...</div>
  <div class="narration-line">Ferdinand Magellan contemple une carte du monde <span class="highlight">incomplete.</span></div>
  <div class="narration-line">Il doit exister une route vers <span class="highlight">les iles aux epices...</span></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script>
const DURATION = 15;
let currentTime = 0;

window.__hf = {
  duration: DURATION,
  seek: function(t) {
    currentTime = t;
    gsap.globalTimeline.time(t);
  }
};

const tl = gsap.timeline({ paused: true });
tl.from(".chapter-title", { duration: 1.5, y: -30, opacity: 0, ease: "power2.out" }, 0)
  .from(".map", { duration: 2, y: 30, opacity: 0, ease: "power2.out" }, 0.5)
  .from(".candle-flame, .candle-body", { duration: 1.5, opacity: 0 }, 0.8)
  .from(".narration-line:nth-child(1)", { duration: 1, opacity: 0, y: 20 }, 2)
  .from(".narration-line:nth-child(2)", { duration: 1, opacity: 0, y: 20 }, 5)
  .from(".narration-line:nth-child(3)", { duration: 1, opacity: 0, y: 20 }, 9);

window.__timelines = { chapitre1: tl };
</script>
</body>
</html>
